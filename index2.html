<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ป้ายราคาทอง แนวตั้ง - โทนม่วง (หัวแดง)</title>
    <!-- โหลด Font Bai Jamjuree จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* -----------------------------------
           ตั้งค่าโทนสี: ม่วงเข้ม ม่วงสว่าง ขาว ดำ แดง เหลือง
           ----------------------------------- */
        :root {
            --bg-dark-purple: #4a148c;   /* ม่วงเข้ม */
            --bg-bright-purple: #d500f9; /* ม่วงสว่าง */
            --bg-gradient-top: #7b1fa2;  /* ม่วงกลางสำหรับไล่สี */
            --text-white: #ffffff;       /* ขาว */
            --text-black: #111111;       /* ดำ */
            --bg-white: #ffffff;         /* พื้นหลังขาว */
            --bg-red: #c62828;           /* แดง (สำหรับหัวข้อ) */
            --text-yellow: #ffeb3b;      /* เหลือง (สำหรับข้อความหัวข้อ) */
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bai Jamjuree', sans-serif;
            background: radial-gradient(circle, var(--bg-gradient-top) 0%, var(--bg-dark-purple) 100%);
            display: flex;
            flex-direction: column;
            position: relative; 
            cursor: none; /* ซ่อนลูกศรเมาส์ถาวรสำหรับโหมด Kiosk */
        }

        /* ส่วนหัว (Header) */
        header {
            height: 10vh;
            background-color: var(--bg-dark-purple);
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8vw;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.6);
            border-bottom: 5px solid var(--bg-bright-purple);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 10;
        }

        /* ส่วนเนื้อหาหลัก (Main) */
        main {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 3vh 4vw; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 2vh; 
            opacity: 0;
            transition: opacity 1s ease-in-out;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }

        /* เผื่อพื้นที่ด้านล่างให้หน้า 1 ไม่โดนตัววิ่งบัง */
        #screen1 {
            padding-bottom: 11vh; 
        }

        /* -----------------------------------
           หน้า 1: การ์ดราคาทองคำแท่ง (การ์ดเดี่ยว)
           ----------------------------------- */
        .card {
            background-color: var(--bg-white);
            border: 6px solid var(--bg-bright-purple);
            border-radius: 30px;
            flex: 1; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .card-header {
            background-color: var(--bg-red); /* เปลี่ยนเป็นสีแดง */
            color: var(--text-yellow);       /* เปลี่ยนเป็นสีเหลือง */
            font-size: 8vw; 
            font-weight: 800;
            text-align: center;
            padding: 3vh 0;
            border-bottom: 4px solid var(--text-yellow); /* ปรับขอบล่างเป็นสีเหลืองให้เข้ากัน */
        }

        /* คอนเทนเนอร์สำหรับจัดวางกล่องซื้อ-ขาย */
        .price-container {
            flex: 1;
            display: flex;
            flex-direction: column; 
            align-items: center;
            padding: 3vh 0; 
            gap: 3vh; 
        }

        /* กล่องย่อยสำหรับแยก รับซื้อ/ขายออก */
        .price-box {
            text-align: center;
            width: 90%;  
            flex: 1; 
            background-color: var(--bg-white);
            border: 6px solid var(--bg-dark-purple);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* หัวข้อ รับซื้อ/ขายออก ภายในกล่องย่อย */
        .price-label {
            font-size: 7vw; 
            color: var(--text-white);
            background-color: var(--bg-dark-purple);
            font-weight: 700;
            padding: 2.5vh 0;
            margin: 0;
        }

        /* ตัวเลขราคาในกล่องย่อย */
        .price-value {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15vw; 
            font-weight: 800;
            color: var(--text-black);
            padding: 1vh 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* -----------------------------------
           หน้า 2: ป้ายอ้างอิง และ Grid % ทอง
           ----------------------------------- */
        .main-price-card {
            background-color: var(--bg-white);
            border: 5px solid var(--bg-dark-purple);
            border-radius: 20px;
            padding: 1.5vh 4vw; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            gap: 0.5vh;
        }

        .main-price-card h2 {
            margin: 0;
            font-size: 4.8vw; 
            font-weight: 700;
            color: var(--text-black);
        }

        .main-price-card .main-value {
            font-size: 9vw; 
            font-weight: 800;
            color: var(--bg-dark-purple); 
        }

        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 1.5vh 3vw; 
            min-height: 0;
        }

        .percent-box {
            background-color: var(--bg-dark-purple);
            border: 4px solid var(--bg-bright-purple);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            color: var(--text-white);
        }

        .percent-title {
            font-size: 4.5vw; 
            font-weight: 700;
            margin-bottom: 0; 
        }

        .percent-value {
            font-size: 6vw; 
            font-weight: 800;
            background-color: var(--bg-white);
            color: var(--text-black);
            width: 85%;
            text-align: center;
            border-radius: 12px;
            padding: 0.8vh 0; 
            margin-top: 0.8vh;
        }

        /* -----------------------------------
           ส่วนท้าย (Footer) ตัววิ่ง
           ----------------------------------- */
        footer {
            height: 8vh;
            background-color: var(--text-black); 
            border-top: 5px solid var(--bg-bright-purple);
            display: flex;
            align-items: center;
            overflow: hidden;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 20; 
            transition: opacity 1s ease-in-out; 
        }

        footer.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
            padding: 1vh 0;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100vw;
            animation: marquee 35s linear infinite;
            font-size: 5.5vw;
            font-weight: 700;
            color: var(--text-white); 
            text-shadow: 0 0 5px var(--bg-bright-purple); 
            line-height: 1.5;
            padding-top: 0.5vh;
            padding-bottom: 0.5vh;
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

    </style>
</head>
<body>

    <header>
        บารมี แอนติกจิวเวลรี่
    </header>

    <main>
        <!-- หน้าที่ 1 : ราคาทองคำแท่ง -->
        <div id="screen1" class="screen active">
            <div class="card">
                <div class="card-header">ราคาทองคำแท่ง (บาทละ)</div>
                <div class="price-container">
                    <!-- กล่องรับซื้อคืน (บน) -->
                    <div class="price-box">
                        <div class="price-label">รับซื้อคืน</div>
                        <div class="price-value" id="bar-buy">กำลังโหลด...</div>
                    </div>
                    <!-- กล่องขายออก (ล่าง) -->
                    <div class="price-box">
                        <div class="price-label">ขายออก</div>
                        <div class="price-value" id="bar-sell">กำลังโหลด...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- หน้าที่ 2 : ราคาเปอร์เซ็นต์ทอง -->
        <div id="screen2" class="screen">
            <div class="main-price-card">
                <h2>ราคาทองคำแท่งรับซื้อ</h2> 
                <div class="main-value"><span id="main-bar-buy">กำลังโหลด...</span> บาท</div>
            </div>
            <div class="grid-container" id="percent-grid">
                <!-- ข้อมูลจะถูกสร้างอัตโนมัติด้วย JavaScript -->
            </div>
        </div>
    </main>

    <!-- Footer ตัววิ่ง -->
    <footer id="site-footer">
        <div class="ticker-wrap">
            <div class="ticker" id="ticker-text">
                กำลังอัพเดทข้อมูลล่าสุด...
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'https://api.chnwt.dev/thai-gold-api/latest';
        const percentages = [90, 85, 80, 75, 70, 60, 58, 50, 40, 37, 30, 20];
        let currentScreen = 1;

        // ฟังก์ชันแปลงตัวเลขให้เป็นจำนวนเต็มและใส่ลูกน้ำ
        function formatToIntegerOnly(val) {
            if (!val) return "0";
            const num = parseFloat(String(val).replace(/,/g, ''));
            return Math.round(num).toLocaleString('th-TH');
        }

        async function fetchGoldData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.status === 'success') {
                    updateUI(data.response);
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateUI(data) {
            const priceData = data.price;

            const formattedBarBuy = formatToIntegerOnly(priceData.gold_bar.buy);
            const formattedBarSell = formatToIntegerOnly(priceData.gold_bar.sell);

            const barBuyNum = parseFloat(String(priceData.gold_bar.buy).replace(/,/g, ''));

            // อัพเดทหน้า 1 (เฉพาะทองคำแท่ง)
            document.getElementById('bar-buy').textContent = formattedBarBuy;
            document.getElementById('bar-sell').textContent = formattedBarSell;

            // อัพเดทหน้า 2
            document.getElementById('main-bar-buy').textContent = formattedBarBuy;

            const gridContainer = document.getElementById('percent-grid');
            gridContainer.innerHTML = ''; 
            
            percentages.forEach(percent => {
                const calculatedPrice = Math.round(barBuyNum * 0.0656 * (percent / 100));
                const displayPrice = calculatedPrice.toLocaleString('th-TH');

                const box = document.createElement('div');
                box.className = 'percent-box';
                box.innerHTML = `
                    <div class="percent-title">ทอง ${percent}%</div>
                    <div class="percent-value">${displayPrice}</div>
                `;
                gridContainer.appendChild(box);
            });

            // อัพเดทตัววิ่ง
            let datetimeStr = "";
            if (data.date) { datetimeStr += data.date + " "; }
            if (data.update_time) { datetimeStr += data.update_time; }
            
            datetimeStr = datetimeStr.replace(/เวลา\s*เวลา/g, 'เวลา').replace(/น\.\s*น\./g, 'น.');

            const promoMessage = " *** รับซื้อ ธนบัตรเก่า เหรียญเก่า พระทองคำ เครื่องลายคราม พดด้วง ให้ราคาสูง ถ้าคุณมีของเก่า ของสะสม อยากเปลี่ยนเป็นเงินสด ติดต่อบารมี สอบถามเพิ่มเติมได้ที่ โทร 080-226-2622 ***";
            
            const fullTickerText = `อัพเดทข้อมูลล่าสุด: ${datetimeStr} ${promoMessage}`;
            document.getElementById('ticker-text').textContent = fullTickerText;
        }

        function switchScreen() {
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');
            const footer = document.getElementById('site-footer');

            if (currentScreen === 1) {
                screen1.classList.remove('active');
                screen2.classList.add('active');
                footer.classList.add('hidden');
                currentScreen = 2;
            } else {
                screen2.classList.remove('active');
                screen1.classList.add('active');
                footer.classList.remove('hidden');
                currentScreen = 1;
            }
        }

        fetchGoldData(); 
        setInterval(fetchGoldData, 300000); 
        setInterval(switchScreen, 30000);
    </script>
</body>
</html>
