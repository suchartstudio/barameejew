<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ป้ายราคาทอง แนวตั้ง - บารมี แอนติกจิวเวลรี่</title>
    <!-- โหลด Font Bai Jamjuree จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าพื้นฐานและการจัดวางสำหรับจอแนวตั้ง 1080x1920 */
        :root {
            --bg-red: #c62828;
            --bg-dark-red: #8e0000;
            --text-yellow: #ffeb3b;
            --text-black: #111111;
            --bg-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bai Jamjuree', sans-serif;
            background: radial-gradient(circle, var(--bg-red) 0%, var(--bg-dark-red) 100%);
            display: flex;
            flex-direction: column;
        }

        /* ส่วนหัว (Header) */
        header {
            height: 10vh; /* ลดสัดส่วนความสูงลงนิดหน่อยสำหรับจอแนวตั้ง */
            background-color: var(--bg-red);
            color: var(--text-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7.5vw; /* ใช้ vw สำหรับจอแนวตั้ง */
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.4);
            border-bottom: 5px solid var(--text-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* ส่วนเนื้อหาหลัก (Main) */
        main {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 3vh 4vw; /* ปรับ padding ให้เหมาะกับแนวตั้ง */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 3vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }

        /* -----------------------------------
           หน้า 1: การ์ดราคาทองคำแท่ง/รูปพรรณ
           ----------------------------------- */
        .card {
            background-color: var(--bg-white);
            border: 5px solid var(--text-yellow);
            border-radius: 25px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-header {
            background-color: var(--text-black);
            color: var(--text-yellow);
            font-size: 6vw; /* ขนาดใหญ่ขึ้น */
            font-weight: 700;
            text-align: center;
            padding: 2vh 0;
        }

        .price-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 2vh 0;
        }

        .price-box {
            text-align: center;
            width: 45%;
        }

        .price-label {
            font-size: 5vw;
            color: var(--text-black);
            font-weight: 700;
            margin-bottom: 1.5vh;
            border-bottom: 4px solid #eee;
            padding-bottom: 1vh;
        }

        .price-value {
            font-size: 11.5vw; /* ขยายตัวเลขให้เต็มตา */
            font-weight: 800;
            color: var(--bg-dark-red); /* เปลี่ยนสีตัวเลขหลักให้เข้มขึ้นนิดนึงในจอตั้ง */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* -----------------------------------
           หน้า 2: ป้ายอ้างอิง และ Grid % ทอง
           ----------------------------------- */
        .main-price-card {
            background-color: var(--bg-white);
            border: 5px solid var(--text-yellow);
            border-radius: 20px;
            padding: 2.5vh 4vw;
            display: flex;
            flex-direction: column; /* เปลี่ยนเป็นแนวตั้งให้ตัวหนังสืออยู่บน ตัวเลขอยู่ล่าง */
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            gap: 1vh;
        }

        .main-price-card h2 {
            margin: 0;
            font-size: 5vw;
            font-weight: 700;
            color: var(--text-black);
        }

        .main-price-card .main-value {
            font-size: 10vw;
            font-weight: 800;
            color: var(--bg-dark-red);
        }

        .grid-container {
            flex: 1;
            display: grid;
            /* ปรับเป็น 2 คอลัมน์ 6 แถว สำหรับจอแนวตั้ง */
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 2vh 3vw;
        }

        .percent-box {
            background-color: var(--bg-dark-red);
            border: 4px solid var(--text-yellow);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: var(--text-yellow);
        }

        .percent-title {
            font-size: 5vw;
            font-weight: 700;
            margin-bottom: 0.5vh;
        }

        .percent-value {
            font-size: 7vw;
            font-weight: 800;
            background-color: var(--bg-white);
            color: var(--text-black);
            width: 90%;
            text-align: center;
            border-radius: 12px;
            padding: 1.5vh 0;
        }

        /* -----------------------------------
           ส่วนท้าย (Footer) ตัววิ่ง
           ----------------------------------- */
        footer {
            height: 8vh;
            background-color: var(--bg-white);
            border-top: 5px solid var(--text-yellow);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
            padding: 1vh 0;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100vw;
            animation: marquee 35s linear infinite;
            font-size: 5vw; /* ปรับขนาดตัววิ่งให้เหมาะกับจอตั้ง */
            font-weight: 700;
            color: var(--bg-dark-red);
            line-height: 1.5;
            padding-top: 0.5vh;
            padding-bottom: 0.5vh;
        }

        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

    </style>
</head>
<body>

    <header>
        บารมี แอนติกจิวเวลรี่
    </header>

    <main>
        <!-- หน้าที่ 1 : ราคาทองคำแท่ง และ รูปพรรณ -->
        <div id="screen1" class="screen active">
            <div class="card">
                <div class="card-header">ราคาทองคำแท่ง (บาทละ)</div>
                <div class="price-container">
                    <div class="price-box">
                        <div class="price-label">รับซื้อคืน</div>
                        <div class="price-value" id="bar-buy">กำลังโหลด...</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">ขายออก</div>
                        <div class="price-value" id="bar-sell">กำลังโหลด...</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">ราคาทองรูปพรรณ (บาทละ)</div>
                <div class="price-container">
                    <div class="price-box">
                        <div class="price-label">รับซื้อคืน</div>
                        <div class="price-value" id="ornament-buy">กำลังโหลด...</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">ขายออก</div>
                        <div class="price-value" id="ornament-sell">กำลังโหลด...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- หน้าที่ 2 : ราคาเปอร์เซ็นต์ทอง -->
        <div id="screen2" class="screen">
            <div class="main-price-card">
                <h2>ราคาทองคำแท่งรับซื้อ</h2> 
                <div class="main-value"><span id="main-bar-buy">กำลังโหลด...</span> บาท</div>
            </div>
            <div class="grid-container" id="percent-grid">
                <!-- ข้อมูลจะถูกสร้างอัตโนมัติด้วย JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="ticker-wrap">
            <div class="ticker" id="ticker-text">
                กำลังอัพเดทข้อมูลล่าสุด...
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'https://api.chnwt.dev/thai-gold-api/latest';
        const percentages = [90, 85, 80, 75, 70, 60, 58, 50, 40, 37, 30, 20];
        let currentScreen = 1;

        // ฟังก์ชันแปลงตัวเลข/ข้อความให้เป็นจำนวนเต็มและใส่ลูกน้ำ
        function formatToIntegerOnly(val) {
            if (!val) return "0";
            const num = parseFloat(String(val).replace(/,/g, ''));
            return Math.round(num).toLocaleString('th-TH');
        }

        async function fetchGoldData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.status === 'success') {
                    updateUI(data.response);
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function updateUI(data) {
            const priceData = data.price;

            const formattedBarBuy = formatToIntegerOnly(priceData.gold_bar.buy);
            const formattedBarSell = formatToIntegerOnly(priceData.gold_bar.sell);
            const formattedOrnamentBuy = formatToIntegerOnly(priceData.gold.buy);
            const formattedOrnamentSell = formatToIntegerOnly(priceData.gold.sell);

            const barBuyNum = parseFloat(String(priceData.gold_bar.buy).replace(/,/g, ''));

            document.getElementById('bar-buy').textContent = formattedBarBuy;
            document.getElementById('bar-sell').textContent = formattedBarSell;
            document.getElementById('ornament-buy').textContent = formattedOrnamentBuy;
            document.getElementById('ornament-sell').textContent = formattedOrnamentSell;

            document.getElementById('main-bar-buy').textContent = formattedBarBuy;

            const gridContainer = document.getElementById('percent-grid');
            gridContainer.innerHTML = ''; 
            
            percentages.forEach(percent => {
                const calculatedPrice = Math.round(barBuyNum * 0.0656 * (percent / 100));
                const displayPrice = calculatedPrice.toLocaleString('th-TH');

                const box = document.createElement('div');
                box.className = 'percent-box';
                box.innerHTML = `
                    <div class="percent-title">ทอง ${percent}%</div>
                    <div class="percent-value">${displayPrice}</div>
                `;
                gridContainer.appendChild(box);
            });

            let datetimeStr = "";
            if (data.date) { datetimeStr += data.date + " "; }
            if (data.update_time) { datetimeStr += data.update_time; }
            
            datetimeStr = datetimeStr.replace(/เวลา\s*เวลา/g, 'เวลา').replace(/น\.\s*น\./g, 'น.');

            const promoMessage = " *** รับซื้อ ธนบัตรเก่า เหรียญเก่า พระทองคำ เครื่องลายคราม พดด้วง ให้ราคาสูง ถ้าคุณมีของเก่า ของสะสม อยากเปลี่ยนเป็นเงินสด ติดต่อบารมี สอบถามเพิ่มเติมได้ที่ โทร 080-226-2622 ***";
            
            const fullTickerText = `อัพเดทข้อมูลล่าสุด: ${datetimeStr} ${promoMessage}`;
            document.getElementById('ticker-text').textContent = fullTickerText;
        }

        function switchScreen() {
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');

            if (currentScreen === 1) {
                screen1.classList.remove('active');
                screen2.classList.add('active');
                currentScreen = 2;
            } else {
                screen2.classList.remove('active');
                screen1.classList.add('active');
                currentScreen = 1;
            }
        }

        fetchGoldData(); 
        setInterval(fetchGoldData, 300000); 
        setInterval(switchScreen, 30000);
    </script>
</body>
</html>
