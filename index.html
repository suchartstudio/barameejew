<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baramee Gold Signage - 3 Screens</title>
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-dark: #4a148c; --bg-bright: #d500f9; --bg-light: #f0d9ff;  
            --text-white: #ffffff; --text-black: #111111; --bg-white: #ffffff;
            --bg-red: #c62828; --text-yellow: #ffeb3b; --ticker-speed: 35s;
        }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Bai Jamjuree', sans-serif; background: radial-gradient(circle, var(--bg-bright) 0%, var(--bg-dark) 100%); display: flex; flex-direction: column; }
        
        header { 
            height: 12vh; background-color: var(--bg-dark); color: var(--text-white); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-bottom: 5px solid var(--bg-bright); box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 10; 
        }
        .header-title { font-size: 5vh; font-weight: 800; line-height: 1.1; }
        #last-update { font-size: 2.5vh; font-weight: 400; margin-top: 5px; opacity: 0.9; color: var(--text-yellow); }

        main { flex: 1; position: relative; width: 100%; }
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            padding: 2vh 2vw; box-sizing: border-box; display: flex; 
            opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none; 
            padding-bottom: 11vh; 
        }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 5; }

        /* Media */
        .screen1-layout { flex-direction: row; gap: 2vw; }
        .left-panel { width: 40%; display: flex; flex-direction: column; }
        .right-panel { width: 60%; background-color: #000; border: 6px solid var(--bg-bright); border-radius: 25px; overflow: hidden; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .media-item { width: 100%; height: 100%; object-fit: fill; display: none; }
        .media-active { display: block; }

        .card { background-color: var(--bg-white); border: 5px solid var(--bg-bright); border-radius: 25px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background-color: var(--bg-red); color: var(--text-yellow); font-size: 4vh; font-weight: 800; text-align: center; padding: 1.5vh 0; border-bottom: 4px solid var(--text-yellow); }
        .price-container { flex: 1; display: flex; flex-direction: column; padding: 2vh 1.5vw; gap: 2vh; }
        .price-box { flex: 1; background-color: var(--bg-light); border: 5px solid var(--bg-dark); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .price-label { font-size: 3.5vh; color: var(--text-white); background-color: var(--bg-dark); font-weight: 700; padding: 1vh 0; text-align: center; }
        .price-value { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10vh; font-weight: 800; color: var(--text-black); }

        /* Tables */
        .screen2-layout { flex-direction: column; }
        .table-container { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-white); border: 5px solid var(--bg-dark); border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .table-header-top { display: flex; justify-content: space-between; align-items: center; padding: 1.5vh 4vw; background-color: var(--bg-light); border-bottom: 4px solid var(--bg-dark); font-size: 4vh; font-weight: 800; color: var(--text-black); }
        .table-subheader { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.5fr; background-color: var(--bg-dark); color: var(--text-white); font-size: 3.5vh; font-weight: 700; text-align: center; padding: 1.5vh 0; border-bottom: 3px solid var(--bg-bright); }
        .grid-rows { display: flex; flex-direction: column; flex: 1; }
        .table-row { display: grid; grid-template-columns: 1fr 1.5fr 1fr 1.5fr; font-size: 4.5vh; font-weight: 700; text-align: center; flex: 1; }
        .table-row:nth-child(even) { background-color: rgba(0,0,0,0.03); }
        .table-row > div { display: flex; justify-content: center; align-items: center; border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; }
        .table-row > div:last-child { border-right: none; }
        .text-percent { color: var(--bg-dark); font-weight: 800; }
        .text-price { color: var(--text-black); background-color: var(--bg-light); padding: 0.5vh 0; width: 85%; border-radius: 12px; font-weight: 800; }

        footer { height: 8vh; background-color: var(--text-black); border-top: 4px solid var(--bg-bright); position: absolute; bottom: 0; left: 0; width: 100%; display: flex; align-items: center; z-index: 20; }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100vw; animation: marquee var(--ticker-speed) linear infinite; font-size: 4.5vh; font-weight: 700; color: #fff; text-shadow: 0 0 8px var(--bg-bright); }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">บารมี แอนติกจิวเวลรี่</div>
        <div id="last-update">อัปเดตข้อมูลล่าสุด: กำลังโหลด...</div>
    </header>
    <main>
        <div id="screen1" class="screen screen1-layout active">
            <div class="left-panel">
                <div class="card">
                    <div class="card-header">ราคาทองคำแท่ง (บาทละ)</div>
                    <div class="price-container">
                        <div class="price-box"><div class="price-label">รับซื้อคืน</div><div id="bar-buy" class="price-value">...</div></div>
                        <div class="price-box"><div class="price-label">ขายออก</div><div id="bar-sell" class="price-value">...</div></div>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <img id="media-img" class="media-item">
                <video id="media-vid" class="media-item" muted autoplay playsinline></video>
            </div>
        </div>
        
        <div id="screen2" class="screen screen2-layout">
            <div class="table-container">
                <div class="table-header-top">
                    <span>ราคาทองคำแท่งรับซื้อ (ชิ้นงาน, ไม่หลอม)</span>
                    <span><span id="buy-raw" style="font-size: 6vh; color: var(--bg-dark);">...</span> บาท</span>
                </div>
                <div class="table-subheader"><div>เปอร์เซ็น</div><div>ราคา/กรัม</div><div>เปอร์เซ็น</div><div>ราคา/กรัม</div></div>
                <div id="grid-raw" class="grid-rows"></div>
            </div>
        </div>

        <div id="screen3" class="screen screen2-layout">
            <div class="table-container">
                <div class="table-header-top">
                    <span>ราคาทองคำแท่งรับซื้อ (+1,500 หลอมก้อน)</span>
                    <span><span id="buy-mod" style="font-size: 6vh; color: var(--bg-dark);">...</span> บาท</span>
                </div>
                <div class="table-subheader"><div>เปอร์เซ็น</div><div>ราคา/กรัม</div><div>เปอร์เซ็น</div><div>ราคา/กรัม</div></div>
                <div id="grid-mod" class="grid-rows"></div>
            </div>
        </div>
    </main>
    <footer id="site-footer"><div class="ticker" id="ticker-text">...</div></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBCR9k_D1GiVugnFqsIxf33Ge96rCmhbZs", 
            authDomain: "signage-eac53.firebaseapp.com", 
            projectId: "signage-eac53", 
            storageBucket: "signage-eac53.firebasestorage.app", 
            messagingSenderId: "184834384558", 
            appId: "1:184834384558:web:6971ad2a33d07c0236c33f" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const settingsRef = ref(db, 'settings');

        const API_URL = 'https://apicheckpricev3.huasengheng.com/api/Values/GetPrice';
        const percentages = [30, 35, 40, 50, 60, 70, 75, 80, 85, 90, 96.5, 99.99];
        const GITHUB_PATH = "https://suchartstudio.github.io/barameejew/"; 
        const forcedMedia = [GITHUB_PATH + "video.mp4", GITHUB_PATH + "slide1.png", GITHUB_PATH + "slide2.png", GITHUB_PATH + "slide3.png"];

        let settings = {}; let mediaIdx = 0; let mediaTimer; let currentScreen = 1;

        onValue(settingsRef, (snap) => {
            const data = snap.val();
            if (data) {
                settings = data;
                document.documentElement.style.setProperty('--bg-dark', settings.colorDark);
                document.documentElement.style.setProperty('--bg-bright', settings.colorBright);
                document.documentElement.style.setProperty('--bg-light', settings.colorLight);
                document.documentElement.style.setProperty('--ticker-speed', settings.tickerSpeed + 's');
                document.getElementById('ticker-text').innerText = settings.tickerText;
                fetchGoldData(); if(currentScreen === 1) playMedia();
            }
        });

        async function fetchGoldData() {
            try {
                // ขอข้อมูลจาก API โดยพยายามรองรับทั้ง JSON และ XML
                const res = await fetch(API_URL, {
                    headers: { 'Accept': 'application/json, text/xml, application/xml' }
                }); 
                const text = await res.text();
                
                let goldData = null;

                try {
                    // ลองอ่านข้อมูลแบบ JSON ก่อนเผื่อ API รองรับ
                    const data = JSON.parse(text);
                    if (Array.isArray(data)) {
                        goldData = data.find(item => item.GoldType === 'REF') || data[1];
                    }
                } catch (jsonError) {
                    // หากอ่านแบบ JSON ไม่ได้ แสดงว่าเป็นข้อมูล XML แน่นอน (DOMParser จัดการ)
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(text, "text/xml");
                    const structs = xmlDoc.getElementsByTagName("GoldPriceStruct");
                    
                    for (let i = 0; i < structs.length; i++) {
                        const typeNode = structs[i].getElementsByTagName("GoldType")[0];
                        if (typeNode && typeNode.textContent === 'REF') {
                            goldData = {
                                Buy: structs[i].getElementsByTagName("Buy")[0]?.textContent,
                                Sell: structs[i].getElementsByTagName("Sell")[0]?.textContent,
                                TimeUpdate: structs[i].getElementsByTagName("TimeUpdate")[0]?.textContent,
                                StrTimeUpdate: structs[i].getElementsByTagName("StrTimeUpdate")[0]?.textContent
                            };
                            break;
                        }
                    }
                    
                    // แผนสำรอง: ถ้าหา GoldType=REF ไม่เจอ ให้ดึงตัวที่ 2 มาใช้งาน
                    if (!goldData && structs.length > 1) {
                        goldData = {
                            Buy: structs[1].getElementsByTagName("Buy")[0]?.textContent,
                            Sell: structs[1].getElementsByTagName("Sell")[0]?.textContent,
                            TimeUpdate: structs[1].getElementsByTagName("TimeUpdate")[0]?.textContent,
                            StrTimeUpdate: structs[1].getElementsByTagName("StrTimeUpdate")[0]?.textContent
                        };
                    }
                }

                // ถ้าไม่มีข้อมูลเลย ให้หยุดการทำงาน
                if (!goldData) return;

                // ดึงค่าตัวเลขออกมาจากฟิลด์ Buy / Sell (ลบเครื่องหมายจุลภาคทิ้ง)
                const baseBuy = parseFloat(String(goldData.Buy || '').replace(/,/g, '')) || 0;
                const baseSell = parseFloat(String(goldData.Sell || '').replace(/,/g, '')) || 0;
                const modifiedBuy = baseBuy + 1500;

                // แสดงผลหน้าจอ
                document.getElementById('bar-buy').innerText = Math.round(baseBuy).toLocaleString();
                document.getElementById('bar-sell').innerText = Math.round(baseSell).toLocaleString();
                document.getElementById('buy-raw').innerText = Math.round(baseBuy).toLocaleString();
                document.getElementById('buy-mod').innerText = Math.round(modifiedBuy).toLocaleString();

                // อัปเดตเวลาล่าสุด
                if (goldData.StrTimeUpdate && goldData.StrTimeUpdate.trim() !== '') {
                    document.getElementById('last-update').innerText = "อัปเดตข้อมูลล่าสุด: " + goldData.StrTimeUpdate;
                } else if (goldData.TimeUpdate) {
                    const dateObj = new Date(goldData.TimeUpdate);
                    const dateThai = dateObj.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + " น.";
                    document.getElementById('last-update').innerText = `อัปเดตข้อมูลล่าสุด: ${dateThai} เวลา ${timeStr}`;
                }

                // สั่งคำนวณตาราง
                renderTable('grid-raw', baseBuy);
                renderTable('grid-mod', modifiedBuy);
                
            } catch (e) { 
                console.error("Error fetching gold data:", e); 
            }
        }

        function renderTable(elementId, buyPrice) {
            const grid = document.getElementById(elementId); grid.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const p1 = percentages[i]; const p2 = percentages[i + 6];
                const val1 = Math.round(buyPrice * 0.0656 * (p1 / 100)).toLocaleString();
                const val2 = Math.round(buyPrice * 0.0656 * (p2 / 100)).toLocaleString();
                grid.innerHTML += `<div class="table-row"><div class="text-percent">${p1}%</div><div><span class="text-price">${val1}</span></div><div class="text-percent">${p2}%</div><div><span class="text-price">${val2}</span></div></div>`;
            }
        }

        function playMedia() {
            if(currentScreen !== 1) return;
            const url = forcedMedia[mediaIdx];
            const isVid = url.toLowerCase().endsWith(".mp4");
            const img = document.getElementById('media-img'); const vid = document.getElementById('media-vid');
            clearTimeout(mediaTimer);
            if (isVid) {
                img.classList.remove('media-active'); vid.classList.add('media-active');
                vid.src = url; vid.load();
                vid.play().catch(() => setTimeout(nextMedia, 5000)); vid.onended = nextMedia;
            } else {
                vid.pause(); vid.classList.remove('media-active'); img.classList.add('media-active');
                img.src = url; mediaTimer = setTimeout(nextMedia, 15000); 
            }
        }

        function nextMedia() {
            mediaIdx++;
            if (mediaIdx >= forcedMedia.length) {
                mediaIdx = 0; switchToScreen(2); 
            } else { playMedia(); }
        }

        function switchToScreen(num) {
            currentScreen = num;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen'+num).classList.add('active');
            
            if (num === 2) setTimeout(() => switchToScreen(3), 90000); 
            else if (num === 3) setTimeout(() => switchToScreen(1), 90000); 
            else playMedia(); 
        }

        setInterval(fetchGoldData, 300000);
    </script>
</body>
</html>
