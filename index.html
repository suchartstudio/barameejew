<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baramee Gold Signage - Display (Updated Path)</title>
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg-dark: #4a148c; --bg-bright: #d500f9; --bg-light: #f0d9ff;  
            --text-white: #ffffff; --text-black: #111111; --bg-white: #ffffff;
            --bg-red: #c62828; --text-yellow: #ffeb3b; --ticker-speed: 35s;
        }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Bai Jamjuree', sans-serif; background: radial-gradient(circle, var(--bg-bright) 0%, var(--bg-dark) 100%); display: flex; flex-direction: column; }
        
        header { 
            height: 12vh; background-color: var(--bg-dark); color: var(--text-white); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-bottom: 5px solid var(--bg-bright); box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 10; 
        }
        .header-title { font-size: 5vh; font-weight: 800; line-height: 1.1; }
        #last-update { font-size: 2.5vh; font-weight: 400; margin-top: 5px; opacity: 0.9; color: var(--text-yellow); }

        main { flex: 1; position: relative; width: 100%; }
        .screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            padding: 2vh 2vw; box-sizing: border-box; display: flex; 
            opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none; 
            padding-bottom: 11vh; 
        }
        .screen.active { opacity: 1; pointer-events: auto; z-index: 5; }

        .screen1-layout { flex-direction: row; gap: 2vw; }
        .left-panel { width: 40%; display: flex; flex-direction: column; }
        .right-panel { 
            width: 60%; background-color: #000; border: 6px solid var(--bg-bright); 
            border-radius: 25px; overflow: hidden; display: flex; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ปรับให้ภาพ/วิดีโอยืดเต็มกรอบ */
        .media-item { width: 100%; height: 100%; object-fit: fill; display: none; }
        .media-active { display: block; }

        .card { background-color: var(--bg-white); border: 5px solid var(--bg-bright); border-radius: 25px; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .card-header { background-color: var(--bg-red); color: var(--text-yellow); font-size: 4vh; font-weight: 800; text-align: center; padding: 1.5vh 0; border-bottom: 4px solid var(--text-yellow); }
        .price-container { flex: 1; display: flex; flex-direction: column; padding: 2vh 1.5vw; gap: 2vh; }
        .price-box { flex: 1; background-color: var(--bg-light); border: 5px solid var(--bg-dark); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .price-label { font-size: 3.5vh; color: var(--text-white); background-color: var(--bg-dark); font-weight: 700; padding: 1vh 0; text-align: center; }
        .price-value { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10vh; font-weight: 800; color: var(--text-black); }

        .screen2-layout { flex-direction: column; gap: 2vh; }
        .main-price-card { background-color: var(--bg-light); border: 4px solid var(--bg-dark); border-radius: 20px; padding: 1.5vh 3vw; display: flex; justify-content: space-between; align-items: center; height: 12%; }
        .grid-container { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(3, 1fr); gap: 1.5vh 1.5vw; }
        .percent-box { background-color: var(--bg-dark); border: 3px solid var(--bg-bright); border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .percent-value { background-color: var(--bg-light); color: #000; width: 85%; text-align: center; border-radius: 10px; font-size: 5.5vh; font-weight: 800; margin-top: 0.5vh; padding: 0.3vh 0; }

        footer { height: 8vh; background-color: var(--text-black); border-top: 4px solid var(--bg-bright); position: absolute; bottom: 0; left: 0; width: 100%; display: flex; align-items: center; z-index: 20; }
        .ticker { display: inline-block; white-space: nowrap; padding-left: 100vw; animation: marquee var(--ticker-speed) linear infinite; font-size: 4.5vh; font-weight: 700; color: #fff; text-shadow: 0 0 8px var(--bg-bright); }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">บารมี แอนติกจิวเวลรี่</div>
        <div id="last-update">อัปเดตข้อมูลล่าสุด: กำลังโหลด...</div>
    </header>
    <main>
        <div id="screen1" class="screen screen1-layout active">
            <div class="left-panel">
                <div class="card">
                    <div class="card-header">ราคาทองคำแท่ง (บาทละ)</div>
                    <div class="price-container">
                        <div class="price-box"><div class="price-label">รับซื้อคืน</div><div id="bar-buy" class="price-value">...</div></div>
                        <div class="price-box"><div class="price-label">ขายออก</div><div id="bar-sell" class="price-value">...</div></div>
                    </div>
                </div>
            </div>
            <div class="right-panel">
                <img id="media-img" class="media-item">
                <video id="media-vid" class="media-item" muted autoplay playsinline></video>
            </div>
        </div>
        <div id="screen2" class="screen screen2-layout">
            <div class="main-price-card">
                <h2 style="font-size: 4vh; margin:0;">ราคาทองคำแท่งรับซื้อล่าสุด</h2>
                <div style="font-size:7vh; font-weight:800; color:var(--bg-dark);"><span id="main-bar-buy">...</span> บาท</div>
            </div>
            <div id="percent-grid" class="grid-container"></div>
        </div>
    </main>
    <footer id="site-footer"><div class="ticker" id="ticker-text">...</div></footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBCR9k_D1GiVugnFqsIxf33Ge96rCmhbZs", authDomain: "signage-eac53.firebaseapp.com",
            projectId: "signage-eac53", storageBucket: "signage-eac53.firebasestorage.app",
            messagingSenderId: "184834384558", appId: "1:184834384558:web:6971ad2a33d07c0236c33f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const settingsRef = ref(db, 'settings');

        const API_URL = 'https://api.chnwt.dev/thai-gold-api/latest';
        const percentages = [90, 85, 80, 75, 70, 60, 58, 50, 40, 37, 30, 20];
        
        // บังคับดึงไฟล์จาก GitHub Pages ของคุณโดยตรง
        const GITHUB_PATH = "https://suchartstudio.github.io/barameejew/"; 
        const forcedMedia = [
            GITHUB_PATH + "video.mp4",
            GITHUB_PATH + "slide1.png",
            GITHUB_PATH + "slide2.png",
            GITHUB_PATH + "slide3.png"
        ];

        let settings = {};
        let mediaIdx = 0;
        let mediaTimer;
        let currentScreen = 1;

        onValue(settingsRef, (snap) => {
            const data = snap.val();
            if (data) {
                settings = data;
                document.documentElement.style.setProperty('--bg-dark', settings.colorDark);
                document.documentElement.style.setProperty('--bg-bright', settings.colorBright);
                document.documentElement.style.setProperty('--bg-light', settings.colorLight);
                document.documentElement.style.setProperty('--ticker-speed', settings.tickerSpeed + 's');
                document.getElementById('ticker-text').innerText = settings.tickerText;
                fetchGoldData();
                if(currentScreen === 1) playMedia();
            }
        });

        async function fetchGoldData() {
            try {
                const res = await fetch(API_URL); const data = await res.json();
                if (data.status === 'success') {
                    const buy = parseFloat(data.response.price.gold_bar.buy.replace(/,/g, ''));
                    document.getElementById('bar-buy').innerText = Math.round(buy).toLocaleString();
                    document.getElementById('bar-sell').innerText = Math.round(parseFloat(data.response.price.gold_bar.sell.replace(/,/g, ''))).toLocaleString();
                    document.getElementById('main-bar-buy').innerText = Math.round(buy).toLocaleString();
                    
                    const now = new Date();
                    const dateThai = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
                    const timeStr = data.response.update_time || now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) + " น.";
                    const round = data.response.update_round ? ` (ครั้งที่ ${data.response.update_round})` : "";
                    document.getElementById('last-update').innerText = `อัปเดตล่าสุด: ${dateThai} เวลา ${timeStr}${round}`;

                    const grid = document.getElementById('percent-grid'); grid.innerHTML = '';
                    percentages.forEach(p => {
                        const val = Math.round(buy * 0.0656 * (p / 100)).toLocaleString();
                        grid.innerHTML += `<div class="percent-box"><div style="font-size:2.5vh; font-weight:700;">ทอง ${p}%</div><div class="percent-value">${val}</div></div>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        function playMedia() {
            if(currentScreen !== 1) return;
            const url = forcedMedia[mediaIdx];
            const isVid = url.toLowerCase().endsWith(".mp4");
            const img = document.getElementById('media-img'); const vid = document.getElementById('media-vid');
            
            clearTimeout(mediaTimer);
            if (isVid) {
                img.classList.remove('media-active'); vid.classList.add('media-active');
                vid.src = url; vid.load();
                vid.play().catch(() => setTimeout(nextMedia, 5000)); 
                vid.onended = nextMedia;
            } else {
                vid.pause(); vid.classList.remove('media-active'); img.classList.add('media-active');
                img.src = url; 
                mediaTimer = setTimeout(nextMedia, 15000); 
            }
        }

        function nextMedia() {
            mediaIdx++;
            if (mediaIdx >= forcedMedia.length) {
                mediaIdx = 0;
                switchToScreen(2); 
            } else {
                playMedia();
            }
        }

        function switchToScreen(num) {
            currentScreen = num;
            const s1 = document.getElementById('screen1');
            const s2 = document.getElementById('screen2');
            if (num === 2) {
                s1.classList.remove('active'); s2.classList.add('active');
                setTimeout(() => switchToScreen(1), 30000);
            } else {
                s2.classList.remove('active'); s1.classList.add('active');
                playMedia();
            }
        }

        setInterval(fetchGoldData, 300000);
    </script>
</body>
</html>
