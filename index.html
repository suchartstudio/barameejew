<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ป้ายราคาทอง - บารมี แอนติกจิวเวลรี่</title>
    <!-- โหลด Font Bai Jamjuree จาก Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าพื้นฐานและการจัดวางสำหรับจอ 1920x1080 */
        :root {
            --bg-red: #c62828;
            --bg-dark-red: #8e0000;
            --text-yellow: #ffeb3b;
            --text-black: #111111;
            --bg-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bai Jamjuree', sans-serif;
            background: radial-gradient(circle, var(--bg-red) 0%, var(--bg-dark-red) 100%);
            display: flex;
            flex-direction: column;
        }

        /* ส่วนหัว (Header) - ปรับให้ใหญ่และหนาขึ้น */
        header {
            height: 13vh;
            background-color: var(--bg-red);
            color: var(--text-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7vh;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.4);
            border-bottom: 5px solid var(--text-yellow);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* ส่วนเนื้อหาหลัก (Main) */
        main {
            flex: 1;
            position: relative;
            width: 100%;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 4vh 4vw;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 4vh;
            opacity: 0;
            transition: opacity 1s ease-in-out;
            pointer-events: none;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }

        /* สไตล์การ์ดข้อมูล (หน้า 1) */
        .card {
            background-color: var(--bg-white);
            border: 4px solid var(--text-yellow);
            border-radius: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .card-header {
            background-color: var(--text-black);
            color: var(--text-yellow);
            font-size: 5vh;
            font-weight: 700;
            text-align: center;
            padding: 1.5vh 0;
        }

        .price-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .price-box {
            text-align: center;
            width: 45%;
        }

        .price-label {
            font-size: 4vh;
            color: var(--text-black);
            font-weight: 700;
            margin-bottom: 1vh;
            border-bottom: 3px solid #eee;
            padding-bottom: 1vh;
        }

        /* ตัวเลขราคาทองหลัก */
        .price-value {
            font-size: 10.5vh;
            font-weight: 800;
            color: var(--text-black);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* สไตล์หน้า 2 */
        .main-price-card {
            background-color: var(--bg-white);
            border: 4px solid var(--text-yellow);
            border-radius: 15px;
            padding: 2vh 4vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .main-price-card h2 {
            margin: 0;
            font-size: 4.5vh;
            font-weight: 700;
            color: var(--text-black);
        }

        /* ตัวเลขป้ายหลักหน้า 2 */
        .main-price-card .main-value {
            font-size: 7.5vh;
            font-weight: 800;
            color: var(--text-black);
        }

        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2.5vh 2vw;
        }

        .percent-box {
            background-color: var(--bg-dark-red);
            border: 3px solid var(--text-yellow);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: var(--text-yellow);
        }

        .percent-title {
            font-size: 4vh;
            font-weight: 700;
            margin-bottom: 0.5vh;
        }

        /* ตัวเลขราคาทองเปอร์เซ็นต์ */
        .percent-value {
            font-size: 5.5vh;
            font-weight: 800;
            background-color: var(--bg-white);
            color: var(--text-black);
            width: 90%;
            text-align: center;
            border-radius: 10px;
            padding: 1vh 0;
        }

        /* ส่วนท้าย (Footer) ตัววิ่ง */
        footer {
            height: 9vh;
            background-color: var(--bg-white);
            border-top: 5px solid var(--text-yellow);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100vw;
            animation: marquee 35s linear infinite;
            font-size: 4.5vh;
            font-weight: 700;
            color: var(--bg-dark-red);
        }

        /* คีย์เฟรมสำหรับทำตัววิ่ง */
        @keyframes marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

    </style>
</head>
<body>

    <header>
        บารมี แอนติกจิวเวลรี่
    </header>

    <main>
        <!-- หน้าที่ 1 : ราคาทองคำแท่ง และ รูปพรรณ -->
        <div id="screen1" class="screen active">
            <div class="card">
                <div class="card-header">ราคาทองคำแท่ง (บาทละ)</div>
                <div class="price-container">
                    <div class="price-box">
                        <div class="price-label">รับซื้อคืน</div>
                        <div class="price-value" id="bar-buy">กำลังโหลด...</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">ขายออก</div>
                        <div class="price-value" id="bar-sell">กำลังโหลด...</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">ราคาทองรูปพรรณ (บาทละ)</div>
                <div class="price-container">
                    <div class="price-box">
                        <div class="price-label">รับซื้อคืน</div>
                        <div class="price-value" id="ornament-buy">กำลังโหลด...</div>
                    </div>
                    <div class="price-box">
                        <div class="price-label">ขายออก</div>
                        <div class="price-value" id="ornament-sell">กำลังโหลด...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- หน้าที่ 2 : ราคาเปอร์เซ็นต์ทอง -->
        <div id="screen2" class="screen">
            <div class="main-price-card">
                <h2>ราคาทองคำแท่งรับซื้อ</h2> <!-- ตัดคำว่า (อ้างอิง) ออก -->
                <div class="main-value"><span id="main-bar-buy">กำลังโหลด...</span> บาท</div>
            </div>
            <div class="grid-container" id="percent-grid">
                <!-- ข้อมูลจะถูกสร้างอัตโนมัติด้วย JavaScript -->
            </div>
        </div>
    </main>

    <footer>
        <div class="ticker-wrap">
            <div class="ticker" id="ticker-text">
                กำลังอัพเดทข้อมูลล่าสุด...
            </div>
        </div>
    </footer>

    <script>
        const API_URL = 'https://api.chnwt.dev/thai-gold-api/latest';
        const percentages = [90, 85, 80, 75, 70, 60, 58, 50, 40, 37, 30, 20];
        let currentScreen = 1;

        // ฟังก์ชันดึงข้อมูลจาก API
        async function fetchGoldData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if(data.status === 'success') {
                    updateUI(data.response);
                }
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // ฟังก์ชันอัปเดตหน้าจอ
        function updateUI(data) {
            const priceData = data.price;

            // ดึงราคาและลบลูกน้ำ (,) ออกเพื่อแปลงเป็นตัวเลขสำหรับการคำนวณ
            const barBuyStr = priceData.gold_bar.buy;
            const barBuyNum = parseFloat(barBuyStr.replace(/,/g, ''));

            // อัปเดตหน้า 1
            document.getElementById('bar-buy').textContent = barBuyStr;
            document.getElementById('bar-sell').textContent = priceData.gold_bar.sell;
            document.getElementById('ornament-buy').textContent = priceData.gold.buy;
            document.getElementById('ornament-sell').textContent = priceData.gold.sell;

            // อัปเดตหน้า 2 (ป้ายหลัก)
            document.getElementById('main-bar-buy').textContent = barBuyStr;

            // อัปเดตหน้า 2 (กริดเปอร์เซ็นต์)
            const gridContainer = document.getElementById('percent-grid');
            gridContainer.innerHTML = ''; // เคลียร์ของเก่า
            
            percentages.forEach(percent => {
                // สูตรคำนวณ: ราคาทองคำแท่งรับซื้อ * 0.0656 * (ทอง% / 100)
                // ใช้ Math.round() เพื่อปัดเศษให้เป็นจำนวนเต็ม
                const calculatedPrice = Math.round(barBuyNum * 0.0656 * (percent / 100));
                
                // จัดฟอร์แมตตัวเลขให้มีลูกน้ำ แต่ไม่มีทศนิยม
                const displayPrice = calculatedPrice.toLocaleString('th-TH');

                const box = document.createElement('div');
                box.className = 'percent-box';
                box.innerHTML = `
                    <div class="percent-title">ทอง ${percent}%</div>
                    <div class="percent-value">${displayPrice}</div> <!-- ตัดหน่วย ฿/กรัม ออก -->
                `;
                gridContainer.appendChild(box);
            });

            // อัปเดต Footer วันที่และเวลา
            let datetimeStr = "";
            if (data.date) { datetimeStr += data.date + " "; }
            if (data.update_time) { datetimeStr += data.update_time; }
            
            // ลบคำว่า "เวลา" หรือ "น." ที่อาจซ้ำซ้อนมาจาก API
            datetimeStr = datetimeStr.replace(/เวลา\s*เวลา/g, 'เวลา').replace(/น\.\s*น\./g, 'น.');

            // กำหนดข้อความตัววิ่งโปรโมท
            const promoMessage = " *** รับซื้อ ธนบัตรเก่า เหรียญเก่า พระทองคำ เครื่องลายคราม พดด้วง ให้ราคาสูง ถ้าคุณมีของเก่า ของสะสม อยากเปลี่ยนเป็นเงินสด ติดต่อบารมี สอบถามเพิ่มเติมได้ที่ โทร 080-226-2622 ***";
            
            // รวมข้อความอัพเดท กับ ข้อความโปรโมทเข้าด้วยกัน
            const fullTickerText = `อัพเดทข้อมูลล่าสุด: ${datetimeStr} ${promoMessage}`;
            document.getElementById('ticker-text').textContent = fullTickerText;
        }

        // ฟังก์ชันสลับหน้าจอ
        function switchScreen() {
            const screen1 = document.getElementById('screen1');
            const screen2 = document.getElementById('screen2');

            if (currentScreen === 1) {
                screen1.classList.remove('active');
                screen2.classList.add('active');
                currentScreen = 2;
            } else {
                screen2.classList.remove('active');
                screen1.classList.add('active');
                currentScreen = 1;
            }
        }

        // เริ่มต้นการทำงานเมื่อโหลดหน้าเว็บ
        fetchGoldData(); // โหลดข้อมูลทันทีครั้งแรก

        // ตั้งเวลาดึงข้อมูลใหม่ทุกๆ 5 นาที (300,000 มิลลิวินาที)
        setInterval(fetchGoldData, 300000); 

        // ตั้งเวลาสลับหน้าจอทุกๆ 30 วินาที (30,000 มิลลิวินาที)
        setInterval(switchScreen, 30000);
    </script>
</body>
</html>
